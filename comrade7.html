<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page | By CodePicker</title>
    <link rel="stylesheet" href="comrade7.css">
</head>
<body>

    <h1 class="title">Login Page | By CodePicker</h1>

    <div class="container">
        <div class="login-box">
            <h2>Login</h2>
            <hr>

            <div class="input-box">
                <input type="text" required>
                <label>Username</label>
            </div>

            <div class="input-box">
                <input type="password" required>
                <label>Password</label>
            </div>

            <p class="forgot">Forget Password?</p>

            <button class="btn">Login</button>

            <p class="signup">
                Not a Member ? <a href="#">Signup</a>
            </p>
        </div>
    </div>

</body>
</html>
